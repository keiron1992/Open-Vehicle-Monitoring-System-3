name: Maxus-T90-Build
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IDF_COMPONENT_MANAGER: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup ESP-IDF
        run: |
          git clone --recursive --depth 1 --branch v4.4.6 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32
          echo "IDF_PATH=$GITHUB_WORKSPACE/esp-idf" >> $GITHUB_ENV

      - name: Targeted Source Patching
        run: |
          cd vehicle/OVMS.V3
          
          # 1. Fix the 'ppp_pcb' error in gsmpppos.h
          # We search for the file and inject the required LwIP headers at the very top
          find . -name "gsmpppos.h" -exec sed -i '1i#include "lwip/opt.h"\n#include "lwip/err.h"\n#include "lwip/arch.h"\n#include "netif/ppp/ppp.h"' {} +
          
          # 2. Fix potential 'netif' errors in swcan
          find . -name "swcan.h" -exec sed -i '1i#include "lwip/netif.h"' {} +
          
          # 3. Fix the WHOLE_ARCHIVE linker issue
          find . -name "CMakeLists.txt" -exec sed -i 's/WHOLE_ARCHIVE//g' {} +
          
          # 4. Remove version-conflicting manifests
          find . -name "dependencies.lock" -delete
          find . -name "idf_component.yml" -delete

      - name: Build Maxus T90 Firmware
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          cd vehicle/OVMS.V3
          
          # Force a clean build state
          rm -rf build
          # Build only the components we need to speed things up and avoid unrelated errors
          idf.py build
          
      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Maxus-T90-Firmware
          path: vehicle/OVMS.V3/build/ovms3.bin
