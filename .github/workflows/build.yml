name: Maxus-T90-Build
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IDF_COMPONENT_MANAGER: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup ESP-IDF
        run: |
          git clone --recursive --depth 1 --branch v4.4.6 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32
          echo "IDF_PATH=$GITHUB_WORKSPACE/esp-idf" >> $GITHUB_ENV

      - name: Pre-build Patch
        run: |
          cd vehicle/OVMS.V3
          
          # 1. Debug: List files to ensure we have the right paths
          ls main/ovms_netlib.h || echo "ovms_netlib.h not in main"
          
          # 2. Fix 'ppp_pcb' and 'netif' errors using the corrected paths
          # These headers are usually in 'main' or specific component subdirectories
          sed -i '1i#include "lwip/netif.h"\n#include "netif/ppp/ppp.h"' components/ovms_cellular/src/gsmpppos.h
          sed -i '1i#include "lwip/netif.h"' components/swcan/src/swcan.h
          sed -i '1i#include "lwip/ip_addr.h"' main/ovms_netlib.h
          
          # 3. Fix the WHOLE_ARCHIVE issue in all CMake files
          find . -name "CMakeLists.txt" -exec sed -i 's/WHOLE_ARCHIVE//g' {} +
          
          # 4. Clean up manifest files that trigger version conflicts
          find . -name "dependencies.lock" -delete
          find . -name "idf_component.yml" -delete

      - name: Build Maxus T90 Firmware
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          cd vehicle/OVMS.V3
          rm -rf build
          idf.py build
          
      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Maxus-T90-Firmware
          path: vehicle/OVMS.V3/build/ovms3.bin
