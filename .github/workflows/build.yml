name: Maxus-T90-Build
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IDF_COMPONENT_MANAGER: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup ESP-IDF
        run: |
          git clone --recursive --depth 1 --branch v4.4.6 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32
          echo "IDF_PATH=$GITHUB_WORKSPACE/esp-idf" >> $GITHUB_ENV

      - name: Smart Patching
        run: |
          cd vehicle/OVMS.V3
          
          # 1. Patch cellular/PPP headers ONLY if the files exist
          find . -name "gsmpppos.h" -exec sed -i '1i#include "lwip/netif.h"\n#include "netif/ppp/ppp.h"' {} +
          find . -name "swcan.h" -exec sed -i '1i#include "lwip/netif.h"' {} +
          
          # 2. Try to find the netlib header even if it's named slightly differently
          NETLIB=$(find . -name "ovms_netlib.h" | head -n 1)
          if [ -f "$NETLIB" ]; then
            sed -i '1i#include "lwip/ip_addr.h"' "$NETLIB"
            echo "Patched $NETLIB"
          else
            echo "ovms_netlib.h not found, skipping specific patch."
          fi
          
          # 3. Fix the WHOLE_ARCHIVE issue in all CMake files
          find . -name "CMakeLists.txt" -exec sed -i 's/WHOLE_ARCHIVE//g' {} +
          
          # 4. Clean up manifest files that trigger version conflicts
          find . -name "dependencies.lock" -delete
          find . -name "idf_component.yml" -delete

      - name: Build Maxus T90 Firmware
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          cd vehicle/OVMS.V3
          rm -rf build
          idf.py build
          
      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Maxus-T90-Firmware
          path: vehicle/OVMS.V3/build/ovms3.bin
