name: Maxus-T90-Build
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IDF_COMPONENT_MANAGER: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup ESP-IDF
        run: |
          git clone --recursive --depth 1 --branch v4.4.6 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32
          echo "IDF_PATH=$GITHUB_WORKSPACE/esp-idf" >> $GITHUB_ENV

      - name: Deep Patching & Configuration
        run: |
          cd vehicle/OVMS.V3
          
          # 1. Fix the Telnet Console 'console' scope error
          # We inject the main console header so 'MyConsole' (console) is recognized
          find . -name "console_telnet.cpp" -exec sed -i '1i#include "ovms_console.h"' {} +
          
          # 2. Force PPP Support into the defaults
          echo "CONFIG_LWIP_PPP_SUPPORT=y" >> sdkconfig.defaults
          echo "CONFIG_LWIP_PPP_PAP_SUPPORT=y" >> sdkconfig.defaults
          echo "CONFIG_LWIP_PPP_CHAP_SUPPORT=y" >> sdkconfig.defaults
          
          # 3. Source patches for networking/CAN
          find . -name "gsmpppos.h" -exec sed -i '1i#define PPP_SUPPORT 1\n#include "lwip/opt.h"\n#include "netif/ppp/ppp.h"' {} +
          find . -name "swcan.h" -exec sed -i '1i#include "lwip/netif.h"' {} +
          
          # 4. Global Linker Fixes
          find . -name "CMakeLists.txt" -exec sed -i 's/WHOLE_ARCHIVE//g' {} +
          
          # 5. Clean manifests
          find . -name "dependencies.lock" -delete
          find . -name "idf_component.yml" -delete

      - name: Build Maxus T90 Firmware
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          cd vehicle/OVMS.V3
          rm -rf build sdkconfig
          # Using '-p' to ensure the environment is fully clean
          idf.py -p -DCONFIG_LWIP_PPP_SUPPORT=y build
          
      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Maxus-T90-Firmware
          path: vehicle/OVMS.V3/build/ovms3.bin
