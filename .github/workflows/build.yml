name: Maxus-T90-Build
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IDF_COMPONENT_MANAGER: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup ESP-IDF
        run: |
          git clone --recursive --depth 1 --branch v4.4.6 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32
          echo "IDF_PATH=$GITHUB_WORKSPACE/esp-idf" >> $GITHUB_ENV

      - name: Deep Patching & Configuration
        run: |
          cd vehicle/OVMS.V3
          
          # 1. Fix Telnet Console scope error
          # We inject the actual class declaration and the extern pointer directly.
          # This bypasses any header-nesting issues.
          find . -name "console_telnet.cpp" -exec sed -i '1i#include "ovms_console.h"\nclass OvmsConsole;\nextern OvmsConsole* MyConsole;\n#define console MyConsole' {} +
          
          # 2. Setup robust sdkconfig.defaults
          # We disable heavy components (SSH/Duktape) if they keep failing, 
          # but first let's try to just force the memory-critical settings.
          cat <<EOF >> sdkconfig.defaults
          CONFIG_LWIP_PPP_SUPPORT=y
          CONFIG_LWIP_PPP_PAP_SUPPORT=y
          CONFIG_LWIP_PPP_CHAP_SUPPORT=y
          CONFIG_COMPILER_OPTIMIZATION_ASSERTIONS_DISABLE=y
          CONFIG_OVMS_COMP_DUKTAPE=n
          CONFIG_OVMS_COMP_SSH=n
          EOF
          
          # 3. Source patches for networking/CAN
          find . -name "gsmpppos.h" -exec sed -i '1i#define PPP_SUPPORT 1\n#include "lwip/opt.h"\n#include "netif/ppp/ppp.h"' {} +
          find . -name "swcan.h" -exec sed -i '1i#include "lwip/netif.h"' {} +
          
          # 4. Global Linker Fixes
          find . -name "CMakeLists.txt" -exec sed -i 's/WHOLE_ARCHIVE//g' {} +
          
          # 5. Clean manifests to prevent registry conflicts
          find . -name "dependencies.lock" -delete
          find . -name "idf_component.yml" -delete

      - name: Build Maxus T90 Firmware
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          cd vehicle/OVMS.V3
          rm -rf build sdkconfig
          
          # Export flags to ignore warnings in third-party code
          export EXTRA_CFLAGS="-w"
          export EXTRA_CXXFLAGS="-w"
          
          idf.py reconfigure
          idf.py build
          
      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Maxus-T90-Firmware
          path: vehicle/OVMS.V3/build/ovms3.bin
