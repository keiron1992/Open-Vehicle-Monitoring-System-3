name: Maxus-T90-Build
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Force-disables the component manager to stop the idf >= 5.0.0 error
  IDF_COMPONENT_MANAGER: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup ESP-IDF
        run: |
          git clone --recursive --depth 1 --branch v4.4.6 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32
          echo "IDF_PATH=$GITHUB_WORKSPACE/esp-idf" >> $GITHUB_ENV

      - name: Pre-build Patch
        run: |
          cd vehicle/OVMS.V3
          
          # 1. Strip 'WHOLE_ARCHIVE' from all config files (v4.4 incompatibility)
          find . -name "CMakeLists.txt" -exec sed -i 's/WHOLE_ARCHIVE//g' {} +
          
          # 2. Delete the files that trigger the automatic version solver
          find . -name "dependencies.lock" -delete
          find . -name "idf_component.yml" -delete
          rm -rf managed_components

      - name: Build Maxus T90 Firmware
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          cd vehicle/OVMS.V3
          
          # Ensure a clean build environment
          rm -rf build
          
          # Start the build
          idf.py build
          
      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Maxus-T90-Firmware
          path: vehicle/OVMS.V3/build/ovms3.bin
