name: Maxus-T90-Build
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IDF_COMPONENT_MANAGER: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup ESP-IDF
        run: |
          git clone --recursive --depth 1 --branch v4.4.6 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32
          echo "IDF_PATH=$GITHUB_WORKSPACE/esp-idf" >> $GITHUB_ENV

      - name: Pre-build Patch
        run: |
          # Move to the source root
          cd vehicle/OVMS.V3
          
          # 1. Broad Patch: Remove WHOLE_ARCHIVE from EVERY CMakeLists.txt in the tree
          # This catches cases in main/ and components/ that previous scripts missed.
          find . -name "CMakeLists.txt" -exec sed -i 's/WHOLE_ARCHIVE//g' {} +
          
          # 2. Nuclear Clean: Remove all artifacts that trigger the component manager
          find . -name "dependencies.lock" -delete
          find . -name "idf_component.yml" -delete
          rm -rf managed_components

      - name: Build Maxus T90 Firmware
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          cd vehicle/OVMS.V3
          
          # Clean build directory to ensure no cached errors
          rm -rf build
          
          # Run the build
          idf.py build
          
      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Maxus-T90-Firmware
          path: vehicle/OVMS.V3/build/ovms3.bin
