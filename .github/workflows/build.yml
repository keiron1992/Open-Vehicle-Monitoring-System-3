name: Maxus-T90-Build
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IDF_COMPONENT_MANAGER: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup ESP-IDF
        run: |
          git clone --recursive --depth 1 --branch v4.4.6 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32
          echo "IDF_PATH=$GITHUB_WORKSPACE/esp-idf" >> $GITHUB_ENV

      - name: Dynamic Pre-build Patch
        run: |
          # We run this from the root to ensure we catch files in /main or /components
          
          # 1. Fix PPP/Networking headers globally
          # This finds any instance of these files and injects the missing includes
          find . -name "gsmpppos.h" -exec sed -i '1i#include "lwip/netif.h"\n#include "netif/ppp/ppp.h"' {} +
          find . -name "swcan.h" -exec sed -i '1i#include "lwip/netif.h"' {} +
          find . -name "ovms_netlib.h" -exec sed -i '1i#include "lwip/ip_addr.h"' {} +
          
          # 2. Fix the WHOLE_ARCHIVE issue (common in v4.4 linker)
          find . -name "CMakeLists.txt" -exec sed -i 's/WHOLE_ARCHIVE//g' {} +
          
          # 3. Nuke the component manager manifests
          # This is the most likely cause of 'Exit Code 2' on fresh builds
          find . -name "dependencies.lock" -delete
          find . -name "idf_component.yml" -delete

      - name: Build Maxus T90 Firmware
        run: |
          . $GITHUB_WORKSPACE/esp-idf/export.sh
          cd vehicle/OVMS.V3
          
          # Clean build to ensure no stale artifacts from previous failed runs
          rm -rf build
          idf.py build
          
      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Maxus-T90-Firmware
          path: vehicle/OVMS.V3/build/ovms3.bin
