name: Maxus-T90-Build
on: [push, workflow_dispatch]

env:
  # This fixes the Node.js 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Setup ESP-IDF
        run: |
          # Cloning with --depth 1 is much faster and more reliable on GitHub
          git clone --recursive --depth 1 --branch v4.4.6 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32
          
      - name: Build Maxus T90 Firmware
        run: |
          . ./esp-idf/export.sh
          # This builds the project using your custom CMakeLists.txt
          idf.py -DCMAKE_POLICY_VERSION_MINIMUM=3.5 build
          
      - name: Upload Finished Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Maxus-T90-Firmware
          path: build/ovms3.bin
